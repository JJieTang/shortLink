spring:
  application:
    name: shortlink
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shortlink}
    username: ${DB_USERNAME:shortlink}
    password: ${DB_PASSWORD:shortlink}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5s

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

app:
  async:
    click-event:
      core-pool-size: 2
      max-pool-size: 4
      queue-capacity: 200
      thread-name-prefix: click-event-
      await-termination-seconds: 10
  base-url: http://localhost:8080
  cache:
    url-ttl: 24h
  jwt:
    issuer: shortlink
    secret: ${JWT_SECRET:replace-this-dev-secret-with-at-least-32-characters}
    access-token-ttl: 15m
    refresh-token-ttl: 7d
    cleanup-interval: 6h
  click-stream:
    stream-key: click-events
    dlq-stream-key: click-events-dlq
    max-length: 100000
    consumer-group: click-event-consumers
    consumer-name: ${CLICK_STREAM_CONSUMER_NAME:${spring.application.name}-consumer}
    batch-size: 50
    poll-timeout: 2s
    max-retries: 3
  rate-limit:
    key-prefix: rate-limit
  geoip:
    database-path: ${GEOIP_DB_PATH:}
